name: "Synthia Agent Evals"
description: >-
  Run Synthia agent evals against your repo's agent and gate the PR on pass
  rate — scores, baseline deltas, and a hosted report link as a PR comment.
author: "Synthia Research"
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  api-key:
    description: >-
      Synthia API key (store it in Actions secrets). When empty — e.g. a fork
      PR, where secrets don't flow — the action skips with a notice and a
      green check instead of failing.
    required: false
  config:
    description: "Path to synthia.yaml, relative to working-directory."
    required: false
    default: "synthia.yaml"
  fail-on-threshold:
    description: "Override thresholds.pass_rate (0..1) for this run."
    required: false
  working-directory:
    description: "Directory containing synthia.yaml and the agent."
    required: false
    default: "."
  comment:
    description: "Post/update the PR comment on pull_request events."
    required: false
    default: "true"
  warn-only:
    description: >-
      Advisory mode: still run and post the comment with scores and
      regressions, but keep the check green (don't fail the PR on a failed
      gate). Config/infra errors still fail. Use it to adopt Synthia
      non-blocking before flipping it to a required check.
    required: false
    default: "false"
  github-token:
    description: "Token used to post the PR comment."
    required: false
    default: ${{ github.token }}
  language:
    description: >-
      Eval runtime: 'node' (in-process JS/TS agent, default) or 'python'
      (shells out to `python -m synthia`, which you installed via
      `pip install synthiaresearch` in a prior step).
    required: false
    default: "node"
  results-path:
    description: >-
      Where the python CLI writes / the action reads synthia-results.json
      (passed to the CLI as --output; relative to working-directory).
      Ignored for language: node.
    required: false
    default: "synthia-results.json"
  session-suffix:
    description: >-
      Scope the CI session to ci/<repo>/<suffix> so multiple agent suites in
      one repo (e.g. a JS and a Python agent) keep separate baseline lineages.
    required: false
    default: ""

outputs:
  status:
    description: "passed | failed | skipped (no api-key available)"
  pass-rate:
    description: "Suite pass rate (0..1)."
  report-url:
    description: "Hosted run report."

runs:
  using: "node24"
  main: "dist/index.js"
